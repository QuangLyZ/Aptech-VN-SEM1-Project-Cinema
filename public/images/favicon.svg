<?xml version="1.0" encoding="UTF-8"?>
<!-- Simple SVG favicon: red rounded square with a white film icon (two reels + strip) -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="CineBook">
  <rect x="0" y="0" width="64" height="64" rx="10" ry="10" fill="#dc2626" />
  <!-- film strip -->
  <rect x="12" y="18" width="40" height="28" rx="3" ry="3" fill="#fff" />
  <rect x="16" y="22" width="14" height="8" rx="1" ry="1" fill="#dc2626" />
  <rect x="34" y="22" width="14" height="8" rx="1" ry="1" fill="#dc2626" />
  <!-- perforations -->
  <rect x="14" y="22" width="2" height="4" fill="#dc2626" />
  <rect x="14" y="30" width="2" height="4" fill="#dc2626" />
  <rect x="48" y="22" width="2" height="4" fill="#dc2626" />
  <rect x="48" y="30" width="2" height="4" fill="#dc2626" />
  <!-- reels (circles) -->
  <circle cx="23" cy="28" r="3.5" fill="#dc2626" />
  <circle cx="41" cy="28" r="3.5" fill="#dc2626" />
</svg>
